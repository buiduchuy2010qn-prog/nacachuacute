<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiệm Túi Mù Na Cà Chua (Bản Kệ Gỗ)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Itim&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Itim', cursive, sans-serif;
            background-color: #fffaf0;
            background-image: radial-gradient(#e5e7eb 2px, transparent 2px);
            background-size: 30px 30px;
            overflow-x: hidden;
        }

        /* Viền màu đậm (Tím than) */
        .doodle-border {
            border: 4px solid #4a044e; /* Deep purple */
            border-radius: 255px 15px 225px 15px/15px 225px 15px 255px;
        }

        /* Thiết kế kệ gỗ */
        .wooden-shelf {
            border-bottom: 16px solid #5c3a21; /* Nâu gỗ đậm */
            background: linear-gradient(to top, #8b5a2b 0%, transparent 50%);
            border-radius: 4px;
            box-shadow: 0 12px 15px -3px rgba(92, 58, 33, 0.3);
        }

        /* Hoạt ảnh xé túi chậm */
        @keyframes sketchyShake {
            0% { transform: rotate(0deg) scale(1.1); }
            10% { transform: rotate(-5deg) scale(1.15) translate(-3px, 4px); }
            20% { transform: rotate(5deg) scale(1.15) translate(4px, -2px); }
            30% { transform: rotate(-4deg) scale(1.15) translate(-4px, 2px); }
            40% { transform: rotate(6deg) scale(1.15) translate(3px, -4px); }
            50% { transform: rotate(-6deg) scale(1.15) translate(-2px, 3px); }
            60% { transform: rotate(4deg) scale(1.15) translate(5px, -1px); }
            70% { transform: rotate(-5deg) scale(1.15) translate(-1px, 4px); }
            80% { transform: rotate(7deg) scale(1.15) translate(3px, -3px); }
            90% { transform: rotate(-4deg) scale(1.15) translate(-4px, 2px); }
            100% { transform: rotate(0deg) scale(1.1); }
        }
        .tearing-slow {
            animation: sketchyShake 2.5s ease-in-out both;
        }

        /* Cà chua nhảy ra */
        @keyframes popDoodle {
            0% { transform: scale(0) translateY(50px) rotate(-20deg); opacity: 0; }
            50% { transform: scale(1.3) translateY(-30px) rotate(15deg); opacity: 1; }
            75% { transform: scale(0.9) translateY(10px) rotate(-5deg); opacity: 1; }
            100% { transform: scale(1) translateY(0) rotate(0deg); opacity: 1; }
        }
        .pop-animation {
            animation: popDoodle 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        /* Hiệu ứng bay mất của túi */
        @keyframes fadeOutUp {
            from { opacity: 1; transform: translateY(0) scale(1.1); }
            to { opacity: 0; transform: translateY(-150px) scale(1.3) rotate(30deg); }
        }
        .torn-away {
            animation: fadeOutUp 0.8s ease-in forwards;
        }

        /* Hoạt ảnh lơ lửng cho túi trên kệ */
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(-2deg); }
            50% { transform: translateY(-6px) rotate(2deg); }
        }
        .idle-float {
            animation: float 3s ease-in-out infinite;
            transform-origin: bottom center;
        }

        /* Hoạt ảnh lắc lư cho đồ vật đã mở trên kệ */
        @keyframes sway {
            0%, 100% { transform: rotate(-5deg) scale(0.95); }
            50% { transform: rotate(5deg) scale(1.05); }
        }
        .idle-sway {
            animation: sway 3.5s ease-in-out infinite;
            transform-origin: bottom center;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <!-- Tiêu đề chính -->

    <!-- Kệ trưng bày -->
    <div id="shelf-container" class="flex flex-col gap-12 w-full max-w-4xl my-6 pb-4">

    </div>

    <!-- Nút Reset Lô Mới -->

            🛒 Kệ đã trống! Nhập Thêm Lô Mới 📦

    </div>

    <!-- Màn hình chờ lúc Xé Túi (Modal) -->

        <h2 id="modal-instruction" class="text-3xl md:text-4xl text-[#4a044e] mb-10 font-bold bg-yellow-200 px-6 py-2 doodle-border shadow-[4px_4px_0px_#854d0e]">
            Nhấn thật mạnh để xé!
        </h2>

        <!-- Khu vực hiển thị khi xé -->
        <div class="relative w-64 h-80 md:w-80 md:h-96 flex items-center justify-center">
            
            <!-- Hình Túi Mù lúc đang mở -->
            <div id="modal-blind-bag" class="absolute w-full h-full cursor-pointer hover:scale-105 transition-transform z-20" onclick="startTearing()">
                <!-- SVG Túi vẽ tay sẽ được đưa vào đây -->
            </div>

            <!-- Kết quả cà chua -->

                    <!-- Tên -->
                </div>
            </div>
        </div>

        <!-- Nút quay lại khay túi -->

            Trưng bày lên kệ 🌟

            { name: "Cứt Ngơ Ngác ._.", svg: poopBase("#65a30d", `<circle cx="42" cy="65" r="2.5" fill="${c_brown}"/><circle cx="58" cy="65" r="2.5" fill="${c_brown}"/><line x1="45" y1="75" x2="55" y2="75" stroke="${c_brown}" stroke-width="3" stroke-linecap="round"/>`), isPoop: true },
            { name: "Cứt Buồn Bã T_T", svg: poopBase("#8b5a2b", `<line x1="38" y1="65" x2="48" y2="60" stroke="${c_brown}" stroke-width="3" stroke-linecap="round"/><line x1="62" y1="65" x2="52" y2="60" stroke="${c_brown}" stroke-width="3" stroke-linecap="round"/><circle cx="43" cy="68" r="2.5" fill="${c_brown}"/><circle cx="57" cy="68" r="2.5" fill="${c_brown}"/><path d="M45,80 Q50,70 55,80" fill="none" stroke="${c_brown}" stroke-width="3" stroke-linecap="round"/>`), isPoop: true },
            { name: "Cứt Lấp Lánh ✨", svg: poopBase("#fcd34d", `<path d="M 40 60 Q 45 50 50 60 M 60 60 Q 55 50 50 60" fill="none" stroke="${c_brown}" stroke-width="3" stroke-linecap="round"/><path d="M 45 75 Q 50 85 55 75" fill="none" stroke="${c_brown}" stroke-width="3" stroke-linecap="round"/><path d="M25,45 L27,40 L32,38 L27,36 L25,31 L23,36 L18,38 L23,40 Z" fill="#fff"/><path d="M75,55 L76,51 L80,50 L76,49 L75,45 L74,49 L70,50 L74,51 Z" fill="#fff"/>`), isPoop: true }
        ];

        // --- LOGIC HOẠT ĐỘNG ---

        let isTearing = false;
        let currentBagIndex = -1;
        const totalBags = 12;
        let openedCount = 0;
        let currentRoundRewards = [];

        // Xáo trộn mảng để không trùng lặp
        function shuffleArray(array) {
            let arr = [...array];
            let currentIndex = arr.length, randomIndex;
            while (currentIndex != 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [arr[currentIndex], arr[randomIndex]] = [arr[randomIndex], arr[currentIndex]];
            }
            return arr;
        }

        // Khởi tạo Kệ hàng (Reset)
        function initGrid() {
            // Lấy ngẫu nhiên 12 món từ kho 23 món
            currentRoundRewards = shuffleArray(fullRewardPool).slice(0, 12);
            openedCount = 0;
            isTearing = false;
            
            document.getElementById('reset-btn-container').classList.add('hidden');
            const shelfContainer = document.getElementById('shelf-container');
            shelfContainer.innerHTML = ''; 
            
            // Tạo 3 tầng kệ, mỗi kệ 4 túi
            for(let row = 0; row < 3; row++) {
                const shelf = document.createElement('div');
                shelf.className = 'wooden-shelf w-full h-36 flex justify-around items-end relative px-4 md:px-12 z-10';
                
                for(let col = 0; col < 4; col++) {
                    const i = row * 4 + col;
                    const itemDiv = document.createElement('div');
                    itemDiv.id = `bag-${i}`;
                    // Thêm hoạt ảnh lơ lửng cho chiếc túi chưa mở
                    itemDiv.className = 'w-20 h-28 md:w-28 md:h-36 cursor-pointer hover:scale-110 transition-transform duration-200 idle-float';
                    itemDiv.innerHTML = BAG_SVG;
                    itemDiv.onclick = () => openModal(i);
                    shelf.appendChild(itemDiv);
                }
                shelfContainer.appendChild(shelf);
            }
        }

        // Mở màn hình xé túi 
        function openModal(index) {
            const bagEl = document.getElementById(`bag-${index}`);
            if(bagEl.classList.contains('opened')) return; // Không cho bấm túi đã mở

            currentBagIndex = index;
            isTearing = false;
            
            // Setup lại giao diện modal
            document.getElementById('modal-instruction').innerText = "Nhấn vào túi để xé thật chậm!";
            document.getElementById('modal-blind-bag').innerHTML = BAG_SVG;
            document.getElementById('modal-blind-bag').className = "absolute w-full h-full cursor-pointer hover:scale-105 transition-transform z-20";
            
            document.getElementById('reward-container').classList.add('hidden', 'opacity-0');
            document.getElementById('reward-container').classList.remove('pop-animation');
            document.getElementById('close-modal-btn').classList.add('hidden');

            document.getElementById('opening-modal').classList.remove('hidden');
            document.getElementById('opening-modal').classList.add('flex');
        }

        // Âm thanh "soạt soạt"
        function playSlowTearSound() {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                
                const ctx = new AudioContext();
                const duration = 2.5; 
                const bufferSize = ctx.sampleRate * duration;
                const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
                
                const noise = ctx.createBufferSource();
                noise.buffer = buffer;
                
                const filter = ctx.createBiquadFilter();
                filter.type = 'bandpass';
                filter.frequency.value = 1500; 
                filter.Q.value = 0.4;

                const gain = ctx.createGain();
                const now = ctx.currentTime;
                
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(1.8, now + 0.1);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                gain.gain.linearRampToValueAtTime(1.8, now + 0.7);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 1.1);
                gain.gain.linearRampToValueAtTime(2.2, now + 1.3);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 1.7);
                gain.gain.linearRampToValueAtTime(2.5, now + 1.9);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 2.4);

                noise.connect(filter);
                filter.connect(gain);
                gain.connect(ctx.destination);
                
                noise.start(now);
                noise.stop(now + duration);
            } catch (e) {
                console.log("Không thể phát âm thanh:", e);
            }
        }

        // Thực hiện xé
        function startTearing() {
            if (isTearing) return;
            isTearing = true;

            const bag = document.getElementById('modal-blind-bag');
            const instruction = document.getElementById('modal-instruction');
            const rewardContainer = document.getElementById('reward-container');
            const tomatoSvgWrapper = document.getElementById('tomato-svg-wrapper');
            const tomatoName = document.getElementById('tomato-name');
            const closeBtn = document.getElementById('close-modal-btn');

            instruction.innerText = "Soạt... soạt... chậm thôi...";
            playSlowTearSound();

            bag.classList.remove('hover:scale-105');
            bag.classList.add('tearing-slow');

            setTimeout(() => {
                bag.classList.remove('tearing-slow');
                bag.classList.add('torn-away');
                
                const currentReward = currentRoundRewards[currentBagIndex];
                
                setTimeout(() => {
                    bag.classList.add('hidden'); 
                    tomatoSvgWrapper.innerHTML = currentReward.svg;
                    tomatoName.innerText = currentReward.name;
                    
                    // Màu chữ (Phân màu nâu, Cà chua màu đỏ)
                    if (currentReward.isPoop) {
                        tomatoName.classList.replace('text-[#7f1d1d]', 'text-[#451a03]');
                    } else {
                        tomatoName.classList.replace('text-[#451a03]', 'text-[#7f1d1d]');
                    }
                    
                    rewardContainer.classList.remove('hidden', 'opacity-0');
                    rewardContainer.classList.add('pop-animation');
                    
                    // Dòng text thông báo
                    if (currentReward.isPoop) {
                        instruction.innerText = "Eo ôi!!! 😭";
                    } else if (currentReward.name.includes("Hi xin lỗi Na mo")) {
                        instruction.innerText = "Dễ thương quá, hết giận luôn nha! 🥰";
                    } else {
                        instruction.innerText = "Tadaa! Đáng yêu quá!";
                    }
                    
                    closeBtn.classList.remove('hidden');

                    // Thay chiếc túi trên kệ thành phần thưởng & Tắt hover, đổi hiệu ứng lắc lư
                    const gridBag = document.getElementById(`bag-${currentBagIndex}`);
                    gridBag.innerHTML = currentReward.svg; 
                    gridBag.classList.add('opened', 'cursor-not-allowed');
                    gridBag.classList.remove('hover:scale-110', 'idle-float');
                    
                    openedCount++;

                    // Nếu xé hết 12 túi, hiện nút Reset
                    if (openedCount >= totalBags) {
                        document.getElementById('reset-btn-container').classList.remove('hidden');
                    }

                }, 300);

            }, 2500);
        }

        // Đóng màn hình xé
        function closeModal() {
            document.getElementById('opening-modal').classList.add('hidden');
            document.getElementById('opening-modal').classList.remove('flex');
        }

        // Bắt đầu game khi load
        window.onload = initGrid;
    </script>
</body>
